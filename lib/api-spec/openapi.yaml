openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LSU Football player database API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player records and grades
  - name: teams
    description: Team records
  - name: dashboard
    description: Dashboard aggregates
  - name: meta
    description: Filter metadata
  - name: sync
    description: External data synchronization
  - name: stats
    description: Raw per-source player stats
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List players
      description: Searchable, filterable, paginated list of players with their latest grades
      parameters:
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: team, in: query, required: false, schema: { type: string } }
        - { name: conference, in: query, required: false, description: "Canonical conference name (FBS spellings are deduped).", schema: { type: string } }
        - { name: posGroup, in: query, required: false, schema: { type: string } }
        - { name: position, in: query, required: false, schema: { type: string } }
        - { name: positionGroup, in: query, required: false, description: "Canonical scouting position group (e.g. QB, WR, EDGE).", schema: { type: string } }
        - name: division
          in: query
          required: false
          description: "Team scope derived from conference: fbs, fcs, or power4."
          schema:
            type: string
            enum: [fbs, fcs, power4]
        - { name: season, in: query, required: false, schema: { type: integer } }
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [war, twar, player_value, name, snaps, position, team]
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: pageSize, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Player list page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"
  /players/{playerId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by id
      parameters:
        - { name: playerId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Player detail with full grades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /players/{playerId}/stats:
    get:
      operationId: getPlayerStats
      tags: [players]
      summary: Raw per-source stats for a player
      description: All raw stat lines for the player, grouped by source.
      parameters:
        - { name: playerId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Player raw stats grouped by source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStatsResponse"
  /stats:
    get:
      operationId: listStats
      tags: [stats]
      summary: Raw stats explorer
      description: Searchable, filterable, paginated raw stat lines joined with player info.
      parameters:
        - { name: source, in: query, required: false, description: "Single source or comma-separated list of sources.", schema: { type: string } }
        - { name: season, in: query, required: false, schema: { type: integer } }
        - { name: team, in: query, required: false, schema: { type: string } }
        - { name: conference, in: query, required: false, description: "Canonical conference name (FBS spellings are deduped).", schema: { type: string } }
        - { name: positionGroup, in: query, required: false, description: "Canonical scouting position group (e.g. QB, WR, EDGE).", schema: { type: string } }
        - name: division
          in: query
          required: false
          description: "Team scope derived from conference: fbs, fcs, or power4."
          schema:
            type: string
            enum: [fbs, fcs, power4]
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: key, in: query, required: false, description: "Single stat key or comma-separated list of stat keys.", schema: { type: string } }
        - { name: sort, in: query, required: false, description: "Column to sort by. Defaults to name.", schema: { type: string, enum: [value, name, team] } }
        - { name: order, in: query, required: false, description: "Sort direction. Defaults to asc.", schema: { type: string, enum: [asc, desc] } }
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: pageSize, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Raw stats page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsExplorerResponse"
  /stats/career:
    get:
      operationId: listCareerStats
      tags: [stats]
      summary: Career stats explorer
      description: Searchable, filterable, paginated career totals aggregated across every season a player played. Identity is name-based.
      parameters:
        - { name: source, in: query, required: false, description: "Single source or comma-separated list of sources.", schema: { type: string } }
        - { name: search, in: query, required: false, schema: { type: string } }
        - { name: key, in: query, required: false, description: "Single stat key or comma-separated list of stat keys.", schema: { type: string } }
        - { name: sort, in: query, required: false, description: "Column to sort by. Defaults to total.", schema: { type: string, enum: [total, seasonsCount, lastSeason, name] } }
        - { name: order, in: query, required: false, description: "Sort direction. Defaults to desc.", schema: { type: string, enum: [asc, desc] } }
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: pageSize, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Career stats page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerStatsResponse"
  /stats/meta:
    get:
      operationId: getStatsMeta
      tags: [stats]
      summary: Available raw-stat filter options
      parameters:
        - { name: season, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Stats filter metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsMetaResponse"
  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams
      parameters:
        - { name: conference, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
  /teams/{school}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a team and its roster with grades
      parameters:
        - { name: school, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Team detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: High level dashboard summary
      parameters:
        - { name: season, in: query, required: false, schema: { type: integer } }
        - { name: team, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /dashboard/top-players:
    get:
      operationId: getTopPlayers
      tags: [dashboard]
      summary: Top players by a chosen metric
      parameters:
        - { name: season, in: query, required: false, schema: { type: integer } }
        - { name: team, in: query, required: false, schema: { type: string } }
        - { name: posGroup, in: query, required: false, schema: { type: string } }
        - name: metric
          in: query
          required: false
          schema:
            type: string
            enum: [war, twar, player_value]
        - { name: limit, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Ranked players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
  /dashboard/position-groups:
    get:
      operationId: getPositionGroups
      tags: [dashboard]
      summary: Aggregated metrics per position group
      parameters:
        - { name: season, in: query, required: false, schema: { type: integer } }
        - { name: team, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Position group aggregates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PositionGroupStat"
  /meta/filters:
    get:
      operationId: getFilters
      tags: [meta]
      summary: Available filter options
      responses:
        "200":
          description: Filter metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterOptions"
  /sync/status:
    get:
      operationId: getSyncStatus
      tags: [sync]
      summary: Status of the most recent data sync
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
  /sync:
    post:
      operationId: runSync
      tags: [sync]
      summary: Trigger a data sync from external football APIs
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncInput"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
        "503":
          description: External source unavailable or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /sync/trumedia:
    post:
      operationId: runTrumediaBackfill
      tags: [sync]
      summary: Backfill TruMedia raw stats across a range of seasons
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrumediaBackfillInput"
      responses:
        "200":
          description: Backfill started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
        "503":
          description: External source unavailable or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /sync/espn:
    post:
      operationId: runEspnPhotos
      tags: [sync]
      summary: Backfill ESPN player headshots league-wide
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncInput"
      responses:
        "200":
          description: ESPN photo sync started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
        "503":
          description: External source unavailable or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /sync/schedule:
    put:
      operationId: updateSyncSchedule
      tags: [sync]
      summary: Set the automatic sync cadence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "200":
          description: Updated scheduler status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatus"
        "400":
          description: Invalid schedule value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /sync/espn/backfill:
    post:
      operationId: runEspnBackfill
      tags: [sync]
      summary: Backfill ESPN player headshots across a range of past seasons
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrumediaBackfillInput"
      responses:
        "200":
          description: ESPN photo backfill started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
        "503":
          description: External source unavailable or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /sync/wikipedia:
    post:
      operationId: runWikipediaBackfill
      tags: [sync]
      summary: Backfill player headshots from Wikipedia for players missing a photo
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrumediaBackfillInput"
      responses:
        "200":
          description: Wikipedia photo backfill started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
        "503":
          description: External source unavailable or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
    Player:
      type: object
      required: [playerId, playerName, season]
      properties:
        playerId: { type: string }
        playerName: { type: string }
        team: { type: ["string", "null"] }
        position: { type: ["string", "null"] }
        posGroup: { type: ["string", "null"] }
        conference: { type: ["string", "null"] }
        jersey: { type: ["string", "null"] }
        season: { type: integer }
        week: { type: ["string", "null"] }
        snapsNonSt: { type: ["number", "null"] }
        snapsSt: { type: ["number", "null"] }
        war: { type: ["number", "null"] }
        twar: { type: ["number", "null"] }
        par: { type: ["number", "null"] }
        playerValue: { type: ["number", "null"] }
        playerValuePct: { type: ["number", "null"] }
        playerTier: { type: ["string", "null"] }
        photoUrl: { type: ["string", "null"] }
    PlayerDetail:
      type: object
      required: [playerId, playerName, season]
      properties:
        playerId: { type: string }
        playerName: { type: string }
        team: { type: ["string", "null"] }
        position: { type: ["string", "null"] }
        posGroup: { type: ["string", "null"] }
        conference: { type: ["string", "null"] }
        jersey: { type: ["string", "null"] }
        season: { type: integer }
        week: { type: ["string", "null"] }
        snapsNonSt: { type: ["number", "null"] }
        snapsSt: { type: ["number", "null"] }
        war: { type: ["number", "null"] }
        twar: { type: ["number", "null"] }
        par: { type: ["number", "null"] }
        playerValue: { type: ["number", "null"] }
        playerValuePct: { type: ["number", "null"] }
        playerTier: { type: ["string", "null"] }
        photoUrl: { type: ["string", "null"] }
        grades:
          type: array
          items:
            $ref: "#/components/schemas/GradeItem"
    GradeItem:
      type: object
      required: [key, label, value]
      properties:
        key: { type: string }
        label: { type: string }
        value: { type: number }
        category: { type: ["string", "null"] }
    PlayerListResponse:
      type: object
      required: [players, total, page, pageSize]
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
    Team:
      type: object
      required: [school]
      properties:
        school: { type: string }
        mascot: { type: ["string", "null"] }
        abbreviation: { type: ["string", "null"] }
        conference: { type: ["string", "null"] }
        classification: { type: ["string", "null"] }
        color: { type: ["string", "null"] }
        altColor: { type: ["string", "null"] }
        logo: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        playerCount: { type: ["integer", "null"] }
    TeamDetail:
      type: object
      required: [team, roster]
      properties:
        team:
          $ref: "#/components/schemas/Team"
        roster:
          type: array
          items:
            $ref: "#/components/schemas/Player"
    DashboardSummary:
      type: object
      required: [totalPlayers, totalTeams, seasons]
      properties:
        totalPlayers: { type: integer }
        totalTeams: { type: integer }
        avgWar: { type: ["number", "null"] }
        topPlayer: { $ref: "#/components/schemas/Player" }
        seasons:
          type: array
          items: { type: integer }
        positionGroups:
          type: array
          items:
            $ref: "#/components/schemas/PositionGroupStat"
        topByValue:
          type: array
          items:
            $ref: "#/components/schemas/Player"
    PositionGroupStat:
      type: object
      required: [posGroup, count]
      properties:
        posGroup: { type: string }
        count: { type: integer }
        avgWar: { type: ["number", "null"] }
        avgValue: { type: ["number", "null"] }
        topPlayerName: { type: ["string", "null"] }
        topPlayerWar: { type: ["number", "null"] }
    PositionGroupOption:
      type: object
      required: [value, label]
      properties:
        value: { type: string }
        label: { type: string }
    FilterOptions:
      type: object
      required: [seasons, teams, conferences, posGroups, positions, positionGroups]
      properties:
        seasons:
          type: array
          items: { type: integer }
        teams:
          type: array
          items: { type: string }
        conferences:
          type: array
          items: { type: string }
        posGroups:
          type: array
          items: { type: string }
        positions:
          type: array
          items: { type: string }
        positionGroups:
          type: array
          items:
            $ref: "#/components/schemas/PositionGroupOption"
    SyncStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }
        running: { type: boolean }
        progress:
          oneOf:
            - $ref: "#/components/schemas/SyncProgress"
            - type: "null"
        lastSyncAt: { type: ["string", "null"] }
        playersSynced: { type: ["integer", "null"] }
        teamsSynced: { type: ["integer", "null"] }
        season: { type: ["integer", "null"] }
        message: { type: ["string", "null"] }
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceStatus"
        scheduler:
          $ref: "#/components/schemas/SchedulerStatus"
        scheduledFailure:
          oneOf:
            - $ref: "#/components/schemas/ScheduledFailure"
            - type: "null"
        history:
          type: array
          items:
            $ref: "#/components/schemas/SyncRun"
    ScheduledFailure:
      type: object
      required: [season, message, failedAt]
      properties:
        season: { type: ["integer", "null"] }
        message: { type: ["string", "null"] }
        failedAt: { type: ["string", "null"] }
    SchedulerStatus:
      type: object
      required: [enabled, intervalHours]
      properties:
        enabled: { type: boolean }
        intervalHours: { type: number }
        nextRunAt: { type: ["string", "null"] }
    ScheduleInput:
      type: object
      required: [intervalHours]
      properties:
        intervalHours:
          type: integer
          minimum: 0
          description: Hours between automatic syncs; 0 disables automatic syncs.
    SyncRun:
      type: object
      required: [id, status, trigger]
      properties:
        id: { type: integer }
        status: { type: string }
        trigger: { type: string }
        season: { type: ["integer", "null"] }
        playersSynced: { type: ["integer", "null"] }
        teamsSynced: { type: ["integer", "null"] }
        message: { type: ["string", "null"] }
        startedAt: { type: ["string", "null"] }
        finishedAt: { type: ["string", "null"] }
    SyncProgress:
      type: object
      required: [phase, processed, total]
      properties:
        phase: { type: string }
        processed: { type: integer }
        total: { type: integer }
    SourceStatus:
      type: object
      required: [name, configured]
      properties:
        name: { type: string }
        configured: { type: boolean }
        ok: { type: ["boolean", "null"] }
        detail: { type: ["string", "null"] }
    SyncInput:
      type: object
      properties:
        season: { type: integer }
        team: { type: string }
        conference: { type: string }
    TrumediaBackfillInput:
      type: object
      properties:
        fromSeason: { type: integer }
        toSeason: { type: integer }
    PlayerStatItem:
      type: object
      required: [key, label, season]
      properties:
        key: { type: string }
        label: { type: string }
        value: { type: ["number", "null"] }
        strValue: { type: ["string", "null"] }
        unit: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        season: { type: integer }
        week: { type: ["integer", "null"] }
    SourceStats:
      type: object
      required: [source, stats]
      properties:
        source: { type: string }
        stats:
          type: array
          items:
            $ref: "#/components/schemas/PlayerStatItem"
    PlayerStatsResponse:
      type: object
      required: [sources]
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceStats"
    StatRow:
      type: object
      required: [playerId, playerName, source, key, label, season]
      properties:
        playerId: { type: string }
        playerName: { type: string }
        team: { type: ["string", "null"] }
        position: { type: ["string", "null"] }
        source: { type: string }
        key: { type: string }
        label: { type: string }
        value: { type: ["number", "null"] }
        strValue: { type: ["string", "null"] }
        unit: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        season: { type: integer }
        week: { type: ["integer", "null"] }
    StatsExplorerResponse:
      type: object
      required: [rows, total, page, pageSize]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/StatRow"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
    CareerSeasonEntry:
      type: object
      required: [season, value]
      properties:
        season: { type: integer }
        team: { type: ["string", "null"] }
        value: { type: number }
    CareerStatRow:
      type: object
      required: [displayName, latestPlayerId, source, key, label, agg, seasonsCount, firstSeason, lastSeason, breakdown]
      properties:
        displayName: { type: string }
        latestPlayerId: { type: string }
        latestTeam: { type: ["string", "null"] }
        source: { type: string }
        key: { type: string }
        label: { type: string }
        unit: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        total: { type: ["number", "null"] }
        agg:
          type: string
          enum: [sum, avg]
          description: How `total` is aggregated across seasons — "sum" for counting stats, "avg" for rate/percentage/per-game stats.
        seasonsCount: { type: integer }
        firstSeason: { type: integer }
        lastSeason: { type: integer }
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/CareerSeasonEntry"
    CareerStatsResponse:
      type: object
      required: [rows, total, page, pageSize]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/CareerStatRow"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
    StatKey:
      type: object
      required: [key, label]
      properties:
        key: { type: string }
        label: { type: string }
    SourceKeys:
      type: object
      required: [source, keys]
      properties:
        source: { type: string }
        keys:
          type: array
          items:
            $ref: "#/components/schemas/StatKey"
    StatsMetaResponse:
      type: object
      required: [sources, keysBySource, seasons, teams, conferences, positionGroups]
      properties:
        sources:
          type: array
